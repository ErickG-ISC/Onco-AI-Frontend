<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Onco AI - Autenticación del Sistema</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#1e3a8a,#0f172a);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTENEDOR LOGIN */

.login-container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:8px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.3);
}

/* TITULO */

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
}

/* FORMULARIO */

label{
    font-weight:bold;
    font-size:14px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #cbd5e1;
}

/* BOTON */

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    font-size:15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* ROLES */

.roles{
    margin-top:10px;
    font-size:13px;
    color:#64748b;
}

/* TOKEN */

.token-box{
    margin-top:20px;
    padding:10px;
    border:1px solid #e2e8f0;
    border-radius:5px;
    background:#f8fafc;
    font-size:12px;
    word-break:break-all;
}

</style>

</head>

<body>

<div class="login-container">

<h1>Acceso al Sistema</h1>
<p class="subtitle">Plataforma de Diagnóstico Médico con IA</p>

<form>

<label>Correo electrónico</label>
<input type="email" placeholder="usuario@hospital.com">

<label>Contraseña</label>
<input type="password" placeholder="********">

<label>Rol de acceso</label>

<select>
<option>Médico Radiólogo</option>
<option>Administrador</option>
<option>Investigador IA</option>
</select>

<button type="submit">Iniciar Sesión</button>

</form>

<div class="roles">
Roles disponibles: Administrador | Médico 
</div>

<div class="token-box">

<strong>JWT Token generado:</strong><br>
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

</div>

</div>

</body>
</html>
