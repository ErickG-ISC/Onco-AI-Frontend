<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Onco AI - Detección de Cáncer de Mama</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:0;
}

/* HEADER */

header{
    background:#2b6cb0;
    color:white;
    padding:20px;
}

header h1{
    margin:0;
}

header p{
    margin:5px 0 0 0;
}

/* CONTENEDOR */

.container{
    width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.section-title{
    font-size:20px;
    margin-bottom:20px;
    border-bottom:2px solid #e2e8f0;
    padding-bottom:10px;
}

/* GRID FORM */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    margin-bottom:5px;
}

input, select, textarea{
    padding:8px;
    border:1px solid #cbd5e0;
    border-radius:5px;
}

/* textarea ocupa dos columnas */

.full{
    grid-column:1 / span 2;
}

/* BOTONES */

.buttons{
    margin-top:30px;
    text-align:right;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    font-size:14px;
    cursor:pointer;
}

.save{
    background:#38a169;
    color:white;
}

.update{
    background:#3182ce;
    color:white;
}

.clear{
    background:#e53e3e;
    color:white;
}

</style>
</head>

<body>

<header>
<h1>Onco AI</h1>
<p>Registro de Pacientes</p>
</header>

<div class="container">

<div class="section-title">Información del Paciente</div>

<form>

<div class="form-grid">

<div class="form-group">
<label>ID Paciente</label>
<input type="text" placeholder="Ej: PAC-001">
</div>

<div class="form-group">
<label>Nombre Completo</label>
<input type="text" placeholder="Nombre del paciente">
</div>

<div class="form-group">
<label>Edad</label>
<input type="number">
</div>

<div class="form-group">
<label>Sexo</label>
<select>
<option>Femenino</option>
<option>Masculino</option>
</select>
</div>

<div class="form-group">
<label>Fecha de Nacimiento</label>
<input type="date">
</div>

<div class="form-group">
<label>Número de Identificación</label>
<input type="text">
</div>

<div class="form-group">
<label>Teléfono</label>
<input type="text">
</div>

<div class="form-group">
<label>Correo Electrónico</label>
<input type="email">
</div>

</div>

<br>

<div class="section-title">Información Clínica Básica</div>

<div class="form-grid">

<div class="form-group">
<label>Historial Familiar de Cáncer de Mama</label>
<select>
<option>No</option>
<option>Sí</option>
</select>
</div>

<div class="form-group">
<label>Última Mastografía</label>
<input type="date">
</div>

<div class="form-group">
<label>Embarazos</label>
<input type="number">
</div>

<div class="form-group">
<label>Tratamientos Previos</label>
<select>
<option>Ninguno</option>
<option>Quimioterapia</option>
<option>Radioterapia</option>
<option>Cirugía</option>
</select>
</div>

<div class="form-group full">
<label>Observaciones Médicas</label>
<textarea rows="4" placeholder="Notas clínicas relevantes..."></textarea>
</div>

</div>

<div class="buttons">

<button class="save">Registrar Paciente</button>
<button class="update">Actualizar Información</button>
<button class="clear">Limpiar</button>

</div>

</form>

</div>

</body>
</html>
